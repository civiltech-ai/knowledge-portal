<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil-Tech.ai — Knowledge Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2314B8A6'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='18' font-weight='bold' font-family='serif'>C</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; }
  body { overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;



const CATEGORIES = [
  { id: "sales", name: "Sales & Revenue", icon: "💰", color: "#14B8A6" },
  { id: "ops", name: "Operations", icon: "⚙️", color: "#3B82F6" },
  { id: "finance", name: "Finance & Cash Flow", icon: "💵", color: "#F59E0B" },
  { id: "marketing", name: "Marketing & Growth", icon: "📢", color: "#8B5CF6" },
  { id: "team", name: "Team & Leadership", icon: "👥", color: "#EC4899" },
  { id: "systems", name: "Systems & Processes", icon: "🔄", color: "#06B6D4" },
  { id: "customers", name: "Customers & Retention", icon: "🤝", color: "#10B981" },
  { id: "strategy", name: "Strategy & Planning", icon: "🎯", color: "#EF4444" },
];

const glassBar = (dk, a = 0.7) => dk
  ? { background: `rgba(15,23,42,${a})`, backdropFilter: "blur(20px) saturate(1.6)", WebkitBackdropFilter: "blur(20px) saturate(1.6)", border: "1px solid rgba(148,163,184,0.1)" }
  : { background: `rgba(255,255,255,${a})`, backdropFilter: "blur(20px) saturate(1.6)", WebkitBackdropFilter: "blur(20px) saturate(1.6)", border: "1px solid rgba(255,255,255,0.5)" };

const glassCard = (dk) => dk
  ? { background: "rgba(30,41,59,0.6)", backdropFilter: "blur(16px) saturate(1.4)", WebkitBackdropFilter: "blur(16px) saturate(1.4)", border: "1px solid rgba(148,163,184,0.1)", boxShadow: "0 8px 32px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.03)" }
  : { background: "rgba(255,255,255,0.55)", backdropFilter: "blur(16px) saturate(1.4)", WebkitBackdropFilter: "blur(16px) saturate(1.4)", border: "1px solid rgba(255,255,255,0.6)", boxShadow: "0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.8)" };

const glassInput = (dk) => dk
  ? { background: "rgba(15,23,42,0.5)", border: "1px solid rgba(148,163,184,0.15)" }
  : { background: "rgba(255,255,255,0.6)", border: "1px solid rgba(0,0,0,0.08)" };

function App() {
  const [topics, setTopics] = useState([]);
  const [categories, setCategories] = useState(CATEGORIES);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [dk, setDk] = useState(() => { try { return localStorage.getItem("ct_theme") === "dark"; } catch(e) { return false; } });
  const [view, setView] = useState("home");
  const [viewing, setViewing] = useState(null);
  const [viewHtml, setViewHtml] = useState(null);
  const [viewLoading, setViewLoading] = useState(false);
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [activeFilter, setActiveFilter] = useState("all");

  const notify = useCallback((m) => { setToast(m); setTimeout(() => setToast(null), 3000); }, []);

  useEffect(() => { try { localStorage.setItem("ct_theme", dk ? "dark" : "light"); } catch(e) {} }, [dk]);
  useEffect(() => { fetchTopics(); }, []);

  async function fetchTopics() {
    setLoading(true); setError(null);
    try {
      const res = await fetch("./topics.json?t=" + Date.now());
      if (!res.ok) throw new Error("Could not load topics.json (HTTP " + res.status + ")");
      const data = await res.json();
      setTopics(data.topics || []);
      if (data.categories && data.categories.length > 0) setCategories(data.categories);
    } catch (e) { setError(e.message); setTopics([]); }
    setLoading(false);
  }

  async function openTopic(topic) {
    setViewing(topic); setViewHtml(null); setViewLoading(true);
    try {
      const res = await fetch("./topics/" + topic.file + "?t=" + Date.now());
      if (!res.ok) throw new Error("File not found");
      setViewHtml(await res.text());
    } catch (e) {
      setViewHtml("<html><body style='display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#64748B'><div style='text-align:center'><h2 style='color:#1a2332'>File Not Found</h2><p>Could not load <b>" + (topic.file||"") + "</b></p><p style='font-size:14px;margin-top:12px'>Make sure the file exists in the <code>/topics/</code> folder.</p></div></body></html>");
    }
    setViewLoading(false);
  }

  const visibleTopics = topics.filter(t => t.visible !== false);
  const filtered = search ? visibleTopics.filter(t => t.title.toLowerCase().includes(search.toLowerCase()) || (t.description||"").toLowerCase().includes(search.toLowerCase()) || (t.tags||[]).some(tag => tag.toLowerCase().includes(search.toLowerCase())))
    : activeFilter !== "all" ? visibleTopics.filter(t => t.category === activeFilter) : visibleTopics;
  const catGroups = categories.map(c => ({ ...c, topics: filtered.filter(t => t.category === c.id) })).filter(c => c.topics.length > 0);
  const uncat = filtered.filter(t => !categories.find(c => c.id === t.category));
  const tx = dk ? "#F1F5F9" : "#1a2332";
  const tx2 = dk ? "#94A3B8" : "#64748B";
  const tx3 = dk ? "#475569" : "#9CA3AF";
  const brd = dk ? "rgba(148,163,184,0.12)" : "rgba(0,0,0,0.06)";
  const pri = "#14B8A6";

  return (
    <div style={{ background: dk ? "#0B1120" : "#EFF6F4", minHeight: "100vh", fontFamily: "'DM Sans',sans-serif", color: tx, transition: "background .4s,color .4s", position: "relative", overflow: "hidden" }}>
      {/* Orbs */}
      <div style={{ position: "fixed", top: -200, right: -200, width: 600, height: 600, background: dk ? "radial-gradient(circle,rgba(20,184,166,0.08) 0%,transparent 70%)" : "radial-gradient(circle,rgba(20,184,166,0.12) 0%,transparent 70%)", borderRadius: "50%", pointerEvents: "none", zIndex: 0 }} />
      <div style={{ position: "fixed", bottom: -300, left: -200, width: 700, height: 700, background: dk ? "radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%)" : "radial-gradient(circle,rgba(6,182,212,0.08) 0%,transparent 70%)", borderRadius: "50%", pointerEvents: "none", zIndex: 0 }} />
      <div style={{ position: "fixed", top: "40%", left: "50%", width: 500, height: 500, background: dk ? "radial-gradient(circle,rgba(99,102,241,0.06) 0%,transparent 70%)" : "radial-gradient(circle,rgba(236,72,153,0.04) 0%,transparent 70%)", borderRadius: "50%", pointerEvents: "none", zIndex: 0, transform: "translateX(-50%)" }} />
      {/* Stars */}
      <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0, opacity: dk ? 1 : 0, transition: "opacity 0.8s" }}>
        <svg width="100%" height="100%" style={{ position: "absolute", inset: 0 }}>
          {[[5,8,1.2],[12,15,0.8],[25,6,1.5],[35,22,0.6],[45,12,1],[55,28,0.7],[65,5,1.3],[75,18,0.9],[85,10,1.1],[92,25,0.5],[8,35,0.7],[18,42,1],[30,38,0.6],[42,45,1.2],[58,32,0.8],[68,48,0.5],[78,40,1.1],[88,35,0.9],[10,55,0.8],[22,62,1.1],[38,58,0.6],[48,68,0.9],[62,52,1.3],[72,65,0.7],[82,58,1],[95,62,0.5],[15,75,1],[28,82,0.6],[40,78,1.2],[52,85,0.8],[66,72,0.5],[76,88,1.1],[90,78,0.7]].map(([x,y,r],i) => (
            <circle key={i} cx={`${x}%`} cy={`${y}%`} r={r} fill="#E2E8F0" opacity={0.4+(i%3)*0.2} style={{ animation: `twinkle ${2+(i%4)*0.8}s ease-in-out ${(i%5)*0.4}s infinite alternate` }} />
          ))}
        </svg>
      </div>

      {/* TOPBAR */}
      <div style={{ position: "sticky", top: 0, zIndex: 50, ...glassBar(dk,0.7), borderBottom: `1px solid ${brd}`, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 32px", height: 60 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }} onClick={() => { setView("home"); setActiveFilter("all"); setSearch(""); }}>
          <span style={{ fontFamily: "'Fraunces',serif", fontWeight: 900, fontSize: 18, letterSpacing: -.4, display: "inline" }}><span style={{ background: "linear-gradient(135deg,#14B8A6,#06B6D4)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>Civil</span><span style={{ color: tx }}>-Tech</span><span style={{ fontWeight: 400, color: tx3 }}>.ai</span></span>
          <div style={{ width: 1, height: 20, background: brd, margin: "0 8px" }} />
          <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 1.2, textTransform: "uppercase", color: pri, background: "rgba(20,184,166,0.08)", border: "1px solid rgba(20,184,166,0.18)", padding: "2px 10px", borderRadius: 20 }}>Knowledge Portal</span>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          {view === "home" && <div style={{ position: "relative" }}>
            <input type="text" placeholder="Search topics..." value={search} onChange={e => { setSearch(e.target.value); setActiveFilter("all"); }}
              style={{ padding: "8px 14px 8px 32px", ...glassInput(dk), borderRadius: 10, color: tx, fontFamily: "'DM Sans'", fontSize: 13, outline: "none", width: 200 }} />
            <span style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", fontSize: 13, opacity: 0.5 }}>🔍</span>
          </div>}
          <GlassBtn dk={dk} active={view==="admin"} onClick={() => setView(view==="admin"?"home":"admin")}>⚙️</GlassBtn>
          <ThemeToggle dk={dk} onClick={() => setDk(d => !d)} />
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "32px 28px 60px", position: "relative", zIndex: 1 }}>
        {/* HOME */}
        {view === "home" && (<>
          <div style={{ background: "linear-gradient(135deg,#14B8A6,#06B6D4)", borderRadius: 24, padding: "56px 48px", color: "#fff", marginBottom: 40, position: "relative", overflow: "hidden", boxShadow: "0 20px 60px rgba(20,184,166,0.2)" }}>
            <div style={{ position: "absolute", top: -100, right: -80, width: 350, height: 350, background: "rgba(255,255,255,.07)", borderRadius: "50%" }} />
            <div style={{ position: "absolute", bottom: -60, left: -40, width: 250, height: 250, background: "rgba(255,255,255,.04)", borderRadius: "50%" }} />
            <div style={{ position: "absolute", top: 40, right: 60, width: 120, height: 120, background: "rgba(255,255,255,.06)", borderRadius: 24, transform: "rotate(15deg)" }} />
            <div style={{ position: "relative" }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2.5, textTransform: "uppercase", opacity: .65, marginBottom: 16 }}>Business Knowledge Library</div>
              <h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 38, fontWeight: 900, lineHeight: 1.12, letterSpacing: -.5, marginBottom: 14 }}>Practical Business Education<br/>for Dubai SME Owners</h1>
              <p style={{ fontSize: 16, opacity: .88, lineHeight: 1.7, maxWidth: 580, margin: 0 }}>A growing library of actionable business concepts — each one a standalone training page to help you build systems, grow revenue, and run your business with clarity.</p>
              <div style={{ display: "flex", gap: 10, marginTop: 24, flexWrap: "wrap" }}>
                {[`📖 ${visibleTopics.length} Topics`, `📂 ${categories.length} Categories`, "⚡ Interactive"].map((b,i) => (
                  <span key={i} style={{ background: "rgba(255,255,255,.15)", border: "1px solid rgba(255,255,255,.2)", padding: "6px 16px", borderRadius: 20, fontSize: 12, fontWeight: 600, backdropFilter: "blur(10px)" }}>{b}</span>
                ))}
              </div>
            </div>
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, marginBottom: 28, flexWrap: "wrap" }}>
            <FilterPill active={activeFilter==="all"} dk={dk} onClick={() => { setActiveFilter("all"); setSearch(""); }}>All Topics</FilterPill>
            {categories.filter(c => visibleTopics.some(t => t.category === c.id)).map(c => (
              <FilterPill key={c.id} active={activeFilter===c.id} dk={dk} onClick={() => { setActiveFilter(c.id); setSearch(""); }}>{c.icon} {c.name}</FilterPill>
            ))}
          </div>

          {loading && <div style={{ textAlign: "center", padding: 60, color: tx3 }}><div style={{ fontSize: 36, marginBottom: 12, animation: "pulse 1.5s ease-in-out infinite" }}>📡</div><div style={{ fontSize: 14, fontWeight: 600 }}>Loading topics...</div></div>}

          {error && !loading && (
            <div style={{ ...glassCard(dk), borderRadius: 18, padding: 32, textAlign: "center", marginBottom: 32 }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>⚠️</div>
              <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 8 }}>Could Not Load Topics</div>
              <div style={{ fontSize: 13, color: tx2, marginBottom: 16 }}>{error}</div>
              <div style={{ fontSize: 12, color: tx3, lineHeight: 1.7, maxWidth: 500, margin: "0 auto", textAlign: "left", ...glassInput(dk), borderRadius: 12, padding: 16 }}>
                <b>Setup checklist:</b><br/>1. Create <code>topics.json</code> in repo root<br/>2. Create <code>/topics/</code> folder for HTML files<br/>3. Push to GitHub and enable Pages<br/>4. Click ⚙️ for the required format
              </div>
              <button onClick={fetchTopics} style={{ marginTop: 16, padding: "8px 20px", borderRadius: 10, border: "none", background: "linear-gradient(135deg,#14B8A6,#06B6D4)", color: "#fff", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans'" }}>↻ Retry</button>
            </div>
          )}

          {!loading && !error && catGroups.map(cat => (
            <div key={cat.id} style={{ marginBottom: 44 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                <div style={{ width: 40, height: 40, ...glassCard(dk), borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{cat.icon}</div>
                <div><h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 21, fontWeight: 800, lineHeight: 1.2, margin: 0 }}>{cat.name}</h2><span style={{ fontSize: 11, color: tx3 }}>{cat.topics.length} topic{cat.topics.length!==1?"s":""}</span></div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 16 }}>
                {cat.topics.map(topic => <TopicCard key={topic.id} topic={topic} cat={cat} dk={dk} tx={tx} tx2={tx2} tx3={tx3} pri={pri} brd={brd} onClick={() => openTopic(topic)} />)}
              </div>
            </div>
          ))}
          {!loading && !error && uncat.length > 0 && <div style={{ marginBottom: 44 }}><h2 style={{ fontFamily: "'Fraunces',serif", fontSize: 21, fontWeight: 800, marginBottom: 16 }}>📁 Other</h2><div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(300px,1fr))", gap: 16 }}>{uncat.map(t => <TopicCard key={t.id} topic={t} cat={{color:"#6B7280",icon:"📁",name:"Other"}} dk={dk} tx={tx} tx2={tx2} tx3={tx3} pri={pri} brd={brd} onClick={() => openTopic(t)} />)}</div></div>}
          {!loading && !error && filtered.length === 0 && topics.length > 0 && <div style={{ textAlign: "center", padding: 60, color: tx3 }}><div style={{ fontSize: 48, marginBottom: 16 }}>📭</div><div style={{ fontSize: 16, fontWeight: 600 }}>{search ? "No topics match your search" : "No topics in this category"}</div></div>}
        </>)}

        {/* ADMIN */}
        {view === "admin" && (<>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 28, flexWrap: "wrap", gap: 12 }}>
            <div><h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 28, fontWeight: 900, margin: 0 }}>Settings & Setup Guide</h1><p style={{ color: tx2, fontSize: 14, marginTop: 4 }}>How to add topics and manage your knowledge portal via GitHub.</p></div>
            <button onClick={() => setView("home")} style={{ padding: "9px 20px", borderRadius: 12, ...glassCard(dk), cursor: "pointer", fontFamily: "'DM Sans'", fontSize: 13, fontWeight: 600, color: tx2 }}>← Back</button>
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14, marginBottom: 32 }}>
            {[{ l:"Total Topics", v:topics.length, i:"📖", c:pri },{ l:"Categories", v:categories.length, i:"📂", c:"#3B82F6" },{ l:"Status", v:error?"Error":"Live", i:error?"⚠️":"🟢", c:error?"#EF4444":"#10B981" }].map((s,i) => (
              <div key={i} style={{ ...glassCard(dk), borderRadius: 16, padding: 22, textAlign: "center" }}><div style={{ fontSize: 24, marginBottom: 6 }}>{s.i}</div><div style={{ fontFamily: "'Fraunces',serif", fontSize: 28, fontWeight: 800, color: s.c }}>{s.v}</div><div style={{ fontSize: 10, color: tx3, fontWeight: 600, letterSpacing: .5, textTransform: "uppercase", marginTop: 2 }}>{s.l}</div></div>
            ))}
          </div>

          <div style={{ ...glassCard(dk), borderRadius: 20, padding: 28, marginBottom: 24 }}>
            <h3 style={{ fontFamily: "'Fraunces',serif", fontSize: 18, fontWeight: 800, marginBottom: 18, display: "flex", alignItems: "center", gap: 10 }}><span style={{ width: 32, height: 32, background: "linear-gradient(135deg,#14B8A6,#06B6D4)", borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: "#fff" }}>+</span>How to Add a New Topic</h3>
            {[{ n:"1", t:"Create the HTML with Claude", d:"Ask Claude to create a knowledge card. Download the HTML file." },{ n:"2", t:"Upload to GitHub", d:"Put the HTML file in your repo's /topics/ folder." },{ n:"3", t:"Update topics.json", d:"Add a new entry to the topics array (see format below)." },{ n:"4", t:"Push to GitHub", d:"Commit and push. Site updates in 1-2 minutes." }].map(s => (
              <div key={s.n} style={{ display: "flex", gap: 14, padding: "12px 0", borderBottom: `1px solid ${brd}` }}>
                <div style={{ width: 32, height: 32, background: "linear-gradient(135deg,#14B8A6,#06B6D4)", borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: "'Fraunces',serif", fontWeight: 800, fontSize: 14, flexShrink: 0 }}>{s.n}</div>
                <div><div style={{ fontSize: 14, fontWeight: 600, marginBottom: 2 }}>{s.t}</div><div style={{ fontSize: 12.5, color: tx2 }}>{s.d}</div></div>
              </div>
            ))}
          </div>

          <div style={{ ...glassCard(dk), borderRadius: 20, padding: 28, marginBottom: 24 }}>
            <h3 style={{ fontFamily: "'Fraunces',serif", fontSize: 18, fontWeight: 800, marginBottom: 6 }}>📄 topics.json Format</h3>
            <p style={{ fontSize: 13, color: tx2, marginBottom: 16 }}>Copy this template when adding new topics:</p>
            <div style={{ ...glassInput(dk), borderRadius: 12, padding: 20, fontFamily: "monospace", fontSize: 12, lineHeight: 1.7, color: tx, overflowX: "auto", whiteSpace: "pre" }}>{`{
  "id": "unique-id",
  "title": "Your Topic Title",
  "description": "Brief description...",
  "category": "sales",
  "file": "your-topic-file.html",
  "tags": ["sales", "follow-up"],
  "dateAdded": "2026-05-06",
  "visible": true
}`}</div>
            <div style={{ marginTop: 16 }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                <thead><tr style={{ background: dk ? "rgba(20,184,166,0.15)" : "rgba(20,184,166,0.08)" }}>
                  <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: pri, borderBottom: `2px solid ${brd}` }}>Field</th>
                  <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: pri, borderBottom: `2px solid ${brd}` }}>Required</th>
                  <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: pri, borderBottom: `2px solid ${brd}` }}>Description</th>
                </tr></thead>
                <tbody>{[["id","Yes","Unique identifier"],["title","Yes","Display title"],["description","Yes","Short summary"],["category","Yes","Category id (sales, ops, etc.)"],["file","Yes","Filename in /topics/"],["tags","No","Search keywords"],["dateAdded","No","YYYY-MM-DD"],["visible","No","false to hide"]].map(([f,r,d],i) => (
                  <tr key={i} style={{ borderBottom: `1px solid ${brd}` }}>
                    <td style={{ padding: "7px 12px", fontFamily: "monospace", fontWeight: 600 }}>{f}</td>
                    <td style={{ padding: "7px 12px", color: r==="Yes"?pri:tx3 }}>{r}</td>
                    <td style={{ padding: "7px 12px", color: tx2 }}>{d}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>

          <div style={{ ...glassCard(dk), borderRadius: 20, padding: 28, marginBottom: 24 }}>
            <h3 style={{ fontFamily: "'Fraunces',serif", fontSize: 18, fontWeight: 800, marginBottom: 6 }}>📁 GitHub Repo Structure</h3>
            <p style={{ fontSize: 13, color: tx2, marginBottom: 16 }}>Your repository should look like this:</p>
            <div style={{ ...glassInput(dk), borderRadius: 12, padding: 20, fontFamily: "monospace", fontSize: 12.5, lineHeight: 2, color: tx }}>
              <span style={{ color: pri }}>your-repo/</span><br/>├── <b>index.html</b> <span style={{ color: tx3 }}>← portal page</span><br/>├── <b>topics.json</b> <span style={{ color: tx3 }}>← topic metadata</span><br/>├── <b>topics/</b> <span style={{ color: tx3 }}>← HTML files</span><br/>│   ├── system-driven-business.html<br/>│   ├── customer-drift.html<br/>│   └── ... (100+ files)<br/>└── <b>README.md</b>
            </div>
          </div>

          <div style={{ ...glassCard(dk), borderRadius: 20, padding: 28, marginBottom: 24 }}>
            <h3 style={{ fontFamily: "'Fraunces',serif", fontSize: 18, fontWeight: 800, marginBottom: 14 }}>📂 Available Categories</h3>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {categories.map(c => <span key={c.id} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 20, background: c.color+"14", border: `1px solid ${c.color}30`, fontSize: 12, fontWeight: 600 }}>{c.icon} {c.name} <span style={{ fontFamily: "monospace", fontSize: 10, color: tx3, background: dk?"rgba(0,0,0,0.3)":"rgba(0,0,0,0.05)", padding: "1px 6px", borderRadius: 4 }}>{c.id}</span></span>)}
            </div>
          </div>

          <button onClick={() => { fetchTopics(); notify("✓ Refreshed"); }} style={{ padding: "10px 24px", borderRadius: 12, border: "none", background: "linear-gradient(135deg,#14B8A6,#06B6D4)", color: "#fff", fontFamily: "'DM Sans'", fontSize: 13, fontWeight: 600, cursor: "pointer", boxShadow: "0 4px 16px rgba(20,184,166,0.3)" }}>↻ Refresh Topics</button>
        </>)}
      </div>

      {/* VIEWER */}
      {viewing && (
        <div style={{ position: "fixed", inset: 0, background: dk?"#0B1120":"#F7F8FA", zIndex: 300, display: "flex", flexDirection: "column" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 24px", height: 52, ...glassBar(dk,0.8), borderBottom: `1px solid ${brd}`, flexShrink: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: "'Fraunces',serif", fontWeight: 900, fontSize: 15, display: "inline" }}><span style={{ background: "linear-gradient(135deg,#14B8A6,#06B6D4)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Civil</span><span>-Tech</span><span style={{ fontWeight: 400, opacity: 0.5 }}>.ai</span></span>
              <div style={{ width: 1, height: 16, background: brd, margin: "0 4px" }} />
              <span style={{ fontSize: 14, fontWeight: 600, maxWidth: 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{viewing.title}</span>
            </div>
            <button onClick={() => { setViewing(null); setViewHtml(null); }} style={{ padding: "7px 20px", borderRadius: 10, ...glassCard(dk), fontFamily: "'DM Sans'", fontSize: 12, fontWeight: 600, cursor: "pointer", color: tx2 }}>✕ Close</button>
          </div>
          {viewLoading ? <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: tx3 }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 32, animation: "pulse 1.5s infinite" }}>📄</div><div style={{ fontSize: 14, fontWeight: 600, marginTop: 8 }}>Loading...</div></div></div>
            : viewHtml ? <iframe srcDoc={viewHtml} style={{ flex: 1, width: "100%", border: "none", background: "#fff" }} title={viewing.title} sandbox="allow-scripts allow-same-origin" /> : null}
        </div>
      )}

      {toast && <div style={{ position: "fixed", bottom: 24, right: 24, ...glassCard(dk), borderRadius: 14, padding: "13px 22px", boxShadow: "0 12px 40px rgba(0,0,0,0.18)", fontSize: 13, fontWeight: 600, zIndex: 400, animation: "slideUp .3s ease" }}>✅ {toast.replace(/^[✓]\s?/,"")}</div>}

      {view === "home" && !viewing && !loading && <div style={{ textAlign: "center", padding: "28px 20px", color: tx3, fontSize: 12, borderTop: `1px solid ${brd}`, position: "relative", zIndex: 1 }}>© 2026 Civil-Tech.ai · Business Knowledge Portal · All Rights Reserved</div>}

      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes twinkle{0%{opacity:0.2;transform:scale(0.8)}100%{opacity:0.8;transform:scale(1.2)}}
@keyframes sunRays{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
*{box-sizing:border-box}input::placeholder,textarea::placeholder{color:${tx3}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:rgba(148,163,184,0.2);border-radius:10px}`}</style>
    </div>
  );
}

function GlassBtn({ dk, active, onClick, children }) {
  return <button onClick={onClick} style={{ width:38,height:38,borderRadius:10,...(active?{background:"rgba(20,184,166,0.12)",border:"1px solid rgba(20,184,166,0.25)"}:dk?{background:"rgba(30,41,59,0.5)",border:"1px solid rgba(148,163,184,0.1)"}:{background:"rgba(255,255,255,0.5)",border:"1px solid rgba(0,0,0,0.06)"}),cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,color:active?"#14B8A6":dk?"#94A3B8":"#64748B",backdropFilter:"blur(12px)",transition:"all .2s" }}>{children}</button>;
}

function ThemeToggle({ dk, onClick }) {
  return <button onClick={onClick} title={dk?"Light mode":"Dark mode"} style={{ width:44,height:44,borderRadius:12,cursor:"pointer",position:"relative",overflow:"hidden",background:dk?"linear-gradient(135deg,#1a1a3e,#0f172a)":"linear-gradient(135deg,#87CEEB,#E0F0FF)",border:dk?"1px solid rgba(148,163,184,0.15)":"1px solid rgba(135,206,235,0.4)",boxShadow:dk?"0 2px 12px rgba(0,0,0,0.3)":"0 2px 12px rgba(135,206,235,0.3)",transition:"all 0.5s cubic-bezier(0.4,0,0.2,1)",display:"flex",alignItems:"center",justifyContent:"center" }}>
    <svg width="44" height="44" viewBox="0 0 44 44" style={{ position:"absolute",inset:0,opacity:dk?1:0,transition:"opacity 0.5s",pointerEvents:"none" }}>{[[10,10,1],[34,8,0.8],[8,30,0.6],[36,34,1],[20,6,0.7]].map(([x,y,r],i) => <circle key={i} cx={x} cy={y} r={r} fill="#E2E8F0" opacity={0.5+i*0.1} style={{ animation:`twinkle ${2+i*0.4}s ease-in-out ${i*0.3}s infinite alternate` }} />)}</svg>
    <svg width="22" height="22" viewBox="0 0 24 24" style={{ position:"absolute",transition:"all 0.5s cubic-bezier(0.4,0,0.2,1)",opacity:dk?1:0,transform:dk?"rotate(0) scale(1)":"rotate(-90deg) scale(0.5)" }}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="#FCD34D" stroke="#F59E0B" strokeWidth="0.5"/></svg>
    <svg width="24" height="24" viewBox="0 0 24 24" style={{ position:"absolute",transition:"all 0.5s cubic-bezier(0.4,0,0.2,1)",opacity:dk?0:1,transform:dk?"rotate(90deg) scale(0.5)":"rotate(0) scale(1)" }}><circle cx="12" cy="12" r="5" fill="#FCD34D" stroke="#F59E0B" strokeWidth="0.5"/><g stroke="#F59E0B" strokeWidth="1.5" strokeLinecap="round" style={{ animation:dk?"none":"sunRays 20s linear infinite",transformOrigin:"12px 12px" }}><line x1="12" y1="1" x2="12" y2="3.5"/><line x1="12" y1="20.5" x2="12" y2="23"/><line x1="1" y1="12" x2="3.5" y2="12"/><line x1="20.5" y1="12" x2="23" y2="12"/><line x1="4.22" y1="4.22" x2="5.99" y2="5.99"/><line x1="18.01" y1="18.01" x2="19.78" y2="19.78"/><line x1="4.22" y1="19.78" x2="5.99" y2="18.01"/><line x1="18.01" y1="5.99" x2="19.78" y2="4.22"/></g></svg>
  </button>;
}

function FilterPill({ active, dk, onClick, children }) {
  return <button onClick={onClick} style={{ padding:"7px 16px",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans'",transition:"all .2s",whiteSpace:"nowrap",...(active?{background:"linear-gradient(135deg,#14B8A6,#06B6D4)",color:"#fff",border:"1px solid transparent",boxShadow:"0 2px 10px rgba(20,184,166,0.3)"}:dk?{background:"rgba(30,41,59,0.5)",border:"1px solid rgba(148,163,184,0.1)",color:"#94A3B8",backdropFilter:"blur(8px)"}:{background:"rgba(255,255,255,0.5)",border:"1px solid rgba(0,0,0,0.06)",color:"#64748B",backdropFilter:"blur(8px)"}) }}>{children}</button>;
}

function TopicCard({ topic, cat, dk, tx, tx2, tx3, pri, brd, onClick }) {
  const [h, setH] = useState(false);
  const g = dk?{background:h?"rgba(30,41,59,0.7)":"rgba(30,41,59,0.45)",border:h?"1px solid rgba(20,184,166,0.3)":"1px solid rgba(148,163,184,0.08)",boxShadow:h?"0 12px 40px rgba(0,0,0,0.25)":"0 4px 16px rgba(0,0,0,0.12)"}:{background:h?"rgba(255,255,255,0.75)":"rgba(255,255,255,0.5)",border:h?"1px solid rgba(20,184,166,0.3)":"1px solid rgba(255,255,255,0.6)",boxShadow:h?"0 12px 40px rgba(0,0,0,0.08)":"0 4px 16px rgba(0,0,0,0.03)"};
  return (
    <div onClick={onClick} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ ...g, backdropFilter:"blur(16px) saturate(1.4)",WebkitBackdropFilter:"blur(16px) saturate(1.4)",borderRadius:18,padding:24,cursor:"pointer",transition:"all .3s cubic-bezier(.4,0,.2,1)",transform:h?"translateY(-4px)":"none",position:"relative",overflow:"hidden" }}>
      <div style={{ position:"absolute",top:-20,right:-20,width:100,height:100,background:`radial-gradient(circle,${cat?.color||"#6B7280"}15 0%,transparent 70%)`,borderRadius:"50%",transition:"all .3s",opacity:h?1:0.4 }} />
      <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:14,position:"relative" }}>
        <span style={{ fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:8,background:(cat?.color||"#6B7280")+"14",color:cat?.color||"#6B7280",border:`1px solid ${(cat?.color||"#6B7280")}25` }}>{cat?.icon} {cat?.name||"Other"}</span>
      </div>
      <h3 style={{ fontFamily:"'Fraunces',serif",fontSize:17,fontWeight:800,lineHeight:1.3,marginBottom:8,letterSpacing:-.2,position:"relative" }}>{topic.title}</h3>
      <p style={{ fontSize:13,color:tx2,lineHeight:1.65,margin:0,display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical",overflow:"hidden",position:"relative" }}>{topic.description||"No description."}</p>
      <div style={{ display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:16,position:"relative" }}>
        <span style={{ fontSize:11,color:tx3 }}>{topic.dateAdded||""}</span>
        <span style={{ fontSize:12,fontWeight:600,color:h?pri:tx3,transition:"color .2s" }}>Open →</span>
      </div>
      {topic.tags && topic.tags.length > 0 && <div style={{ display:"flex",gap:4,marginTop:10,flexWrap:"wrap",position:"relative" }}>{topic.tags.slice(0,3).map((tag,i) => <span key={i} style={{ fontSize:10,padding:"2px 8px",borderRadius:6,background:dk?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.03)",color:tx3,border:`1px solid ${brd}` }}>{tag}</span>)}</div>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
